name: Build 32-bit Windows EXE

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python (32-bit x86)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'  # 32-bit

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Find Python DLL path
        run: |
          $pythonDllDir = python -c "import sys; print(sys.exec_prefix)"
          echo "Python DLL dir: $pythonDllDir"
          echo "PYTHON_DLL_DIR=$pythonDllDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build with PyInstaller (32-bit)
        run: |
          $env:Path = "$env:PYTHON_DLL_DIR;$env:Path"
          python -m PyInstaller sign_tool.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSignTool-32bit
          path: dist/AutoSignTool/
          if-no-files-found: error
