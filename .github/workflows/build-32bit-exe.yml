name: Build 32-bit Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - run: pip install pyinstaller requests

      - run: pyinstaller --onefile --name "AutoSignTool" --add-data "config.json;." sign_tool.py

      - uses: actions/upload-artifact@v4
        with:
          name: AutoSignTool-32bit
          path: dist/AutoSignTool.exe
