name: Build 32-bit Windows EXE

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build 32-bit Windows EXE via Docker (Wine + PyInstaller)
        run: |
          docker run --rm \
            -v "$(pwd):/src" \
            cdrx/pyinstaller-windows:python3_32bit \
            sign_tool.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSignTool-32bit
          path: dist/AutoSignTool/
          if-no-files-found: error
